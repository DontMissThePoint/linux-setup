# pomo config file
# https://github.com/Bahaaio/pomo

onSessionEnd: ask

asciiArt:
  enabled: true
  font: mono12
  color: "#5A56E0"

work:
  duration: 25m
  title: work session
  notification:
    enabled: true
    urgent: false
    title: "work finished 🎉"
    message: time to take a break
    # icon: ~/path/to/icon.png
  then:
    - [paplay, /usr/share/sounds/LinuxMint/stereo/system-ready.ogg]
  #   - [spd-say, "Time to take a break"]

break:
  duration: 5m
  title: break session
  notification:
    enabled: true
    urgent: false
    title: "break over 😴"
    message: back to work!
    # icon: C:\Users\path\to\your\icon.png
  # then:
  #   - [spd-say, "Back to work!"]

longBreak:
  enabled: true
  after: 4
  duration: 20m
